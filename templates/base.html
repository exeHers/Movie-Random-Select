<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Movie Night{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1115;
      --surface: #181c24;
      --border: #2a3140;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #6ee7b7;
      --accent-dim: #34d399;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1a2332 0%, transparent 50%),
                  radial-gradient(900px 500px at 100% 0%, #13221c 0%, transparent 45%),
                  var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    header { margin-bottom: 2rem; }
    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 0.5rem; }
    .sub { color: var(--muted); font-size: 0.95rem; margin: 0; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    label { cursor: pointer; user-select: none; }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; align-items: center; }
    button, .btn {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      padding: 0.65rem 1.1rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: #042f1f;
    }
    button.secondary, .btn.secondary {
      background: var(--border);
      color: var(--text);
    }
    button.danger { background: #3f1d1d; color: var(--danger); border: 1px solid #5c2626; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem; }
    .pill { display: inline-block; font-size: 0.8rem; padding: 0.2rem 0.55rem; border-radius: 999px; background: #252b38; color: var(--muted); }
    ul.seen { list-style: none; padding: 0; margin: 0; }
    ul.seen li { padding: 0.35rem 0; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; }
    ul.seen li:last-child { border-bottom: none; }
    .err { color: var(--danger); font-size: 0.9rem; margin-top: 0.75rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
