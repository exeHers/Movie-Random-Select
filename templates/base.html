<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>{% block title %}Movie Night{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1115;
      --surface: #181c24;
      --surface2: #1e2430;
      --border: #2a3140;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #6ee7b7;
      --accent-dim: #34d399;
      --danger: #f87171;
      --warn: #fbbf24;
      --nav-h: calc(3.5rem + env(safe-area-inset-bottom, 0px));
    }
    * { box-sizing: border-box; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1a2332 0%, transparent 50%),
                  radial-gradient(900px 500px at 100% 0%, #13221c 0%, transparent 45%),
                  var(--bg);
      color: var(--text);
      line-height: 1.45;
      padding-bottom: var(--nav-h);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 28rem; margin: 0 auto; padding: 1rem 1rem 0.5rem; }
    @media (min-width: 480px) {
      .wrap { max-width: 420px; padding: 1.25rem 1.25rem 0.5rem; }
    }
    header { margin-bottom: 1.25rem; }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 0.35rem; }
    h2 { font-size: 1rem; font-weight: 600; margin: 0 0 0.5rem; color: var(--text); }
    .sub { color: var(--muted); font-size: 0.9rem; margin: 0; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.85rem;
    }
    label { cursor: pointer; user-select: none; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; align-items: center; }
    .stack { display: flex; flex-direction: column; gap: 0.65rem; }
    button, .btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      padding: 0.85rem 1rem;
      min-height: 48px;
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: #042f1f;
    }
    button.secondary, .btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost, .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
    }
    button.danger { background: #3f1d1d; color: var(--danger); border: 1px solid #5c2626; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .btn-row button, .btn-row .btn { width: auto; min-height: 48px; font-size: 0.92rem; padding: 0.65rem 0.5rem; }
    .pill {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      background: #252b38;
      color: var(--muted);
    }
    .pill.live { background: #1a3d32; color: var(--accent); }
    ul.compact { list-style: none; padding: 0; margin: 0; }
    ul.compact li {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    ul.compact li:last-child { border-bottom: none; }
    ul.compact a { color: var(--text); font-weight: 500; }
    .err { color: var(--danger); font-size: 0.88rem; margin: 0.5rem 0 0; }
    .hint { color: var(--muted); font-size: 0.8rem; margin: 0.35rem 0 0; }
    input[type="text"], input[type="number"], input[type="date"], textarea {
      width: 100%;
      font: inherit;
      font-size: 1rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    textarea { min-height: 4rem; resize: vertical; }
    .nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 0.5rem calc(0.5rem + env(safe-area-inset-bottom, 0px));
      background: rgba(15, 17, 21, 0.92);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
      z-index: 50;
    }
    .nav a {
      flex: 1;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      padding: 0.35rem 0.25rem;
      border-radius: 10px;
    }
    .nav a.active { color: var(--accent); background: var(--surface2); }
    .embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #000;
    }
    .embed iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
  <nav class="nav" aria-label="Main">
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a>
    <a href="/profiles" class="{% if request.url.path.startswith('/profiles') %}active{% endif %}">Tastes</a>
  </nav>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js").catch(() => {});
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
